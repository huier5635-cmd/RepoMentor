services:
  - type: web
    name: repomentor-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: MAX_REPO_FILES
        value: "1000"
      - key: MAX_FILE_SIZE_KB
        value: "512"
      - key: ANALYZE_TIMEOUT_SECONDS
        value: "120"
      - key: ENABLE_PUBLIC_DEMO_GUARD
        value: "true"
      - key: GITHUB_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
